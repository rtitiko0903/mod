<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineForge</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
        .drop-zone { border: 2px dashed #475569; transition: all 0.3s; }
        .mod-card { background: #1e293b; padding: 1rem; border-radius: 0.75rem; border: 1px solid #334155; margin-bottom: 1rem; }
        /* This makes your logo blend in perfectly with the dark theme */
        .app-logo { width: 48px; height: 48px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <img src="logo.png" alt="MineForge Logo" class="app-logo">
            <h1 class="text-3xl font-bold text-indigo-400">MineForge Mod Compatibility Manager</h1>
        </div>

        <div id="dropZone" class="drop-zone p-8 text-center rounded-xl mb-6 cursor-pointer hover:bg-slate-800">
            <p class="text-slate-400">Drag & Drop .jar files here to check compatibility</p>
        </div>
        <div id="modList" class="space-y-4"></div>
    </div>
    <div id="mod-data">Loading the latest updates...</div>

<script>
    // 2. This script runs when the page loads
    async function getLatestMods() {
        try {
            // Replace this link with the real URL of your mod data file
            const response = await fetch('https://your-website.com/data/mods.json');
            
            if (!response.ok) throw new Error('Could not fetch data');
            
            const data = await response.json();
            
            // This puts the data into your page
            document.getElementById('mod-data').innerText = JSON.stringify(data);
        } catch (error) {
            document.getElementById('mod-data').innerText = "Could not load updates right now.";
            console.error(error);
        }
    }

    // Call the function
    getLatestMods();
</script>


    <script>
        const dropZone = document.getElementById('dropZone');
        const modList = document.getElementById('modList');

        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            for (const file of e.dataTransfer.files) {
                if (file.name.endsWith('.jar')) {
                    const searchTerm = file.name.replace('.jar', '').split('-')[0];
                    searchAndAddMod(searchTerm, file.name);
                }
            }
        });

        ['dragover', 'drop'].forEach(evt => dropZone.addEventListener(evt, e => e.preventDefault()));

        async function searchAndAddMod(term, originalName) {
            try {
                const searchRes = await fetch(`https://api.modrinth.com/v2/search?query=${encodeURIComponent(term)}&limit=1`);
                const searchData = await searchRes.json();
                if (searchData.hits.length === 0) throw new Error('Not found');
                const slug = searchData.hits[0].project_id;
                addModToUI(slug, originalName);
            } catch (err) {
                const card = document.createElement('div');
                card.className = 'mod-card border-red-500 border';
                card.innerHTML = `<p class="text-red-400">Could not find mod: ${term}</p>`;
                modList.appendChild(card);
            }
        }

        async function addModToUI(slug, originalName) {
            const card = document.createElement('div');
            card.className = 'mod-card';
            card.innerHTML = `<p class="text-indigo-300">Fetching data for ${slug}...</p>`;
            modList.appendChild(card);

            try {
                const response = await fetch(`https://api.modrinth.com/v2/project/${slug}`);
                const data = await response.json();
                const verResponse = await fetch(`https://api.modrinth.com/v2/project/${slug}/version`);
                const versions = await verResponse.json();

                const availableVersions = [...new Set(versions.flatMap(v => v.game_versions))].sort().reverse();

                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg">${data.title}</h3>
                            <p class="text-xs text-slate-400">${originalName}</p>
                        </div>
                        <select id="ver-${slug}" class="bg-slate-900 border border-slate-700 p-2 rounded text-sm w-40">
                            <option value="">Select Version</option>
                            ${availableVersions.map(v => `<option value="${v}">${v}</option>`).join('')}
                        </select>
                        <a id="link-${slug}" href="#" target="_blank" class="hidden bg-indigo-600 px-4 py-2 rounded text-sm font-bold hover:bg-indigo-500">Download</a>
                    </div>
                `;

                document.getElementById(`ver-${slug}`).addEventListener('change', (e) => {
                    const version = e.target.value;
                    const link = document.getElementById(`link-${slug}`);
                    const found = versions.find(v => v.game_versions.includes(version));
                    if (found) {
                        link.href = found.files[0].url;
                        link.classList.remove('hidden');
                    } else {
                        link.classList.add('hidden');
                    }
                });
            } catch (err) {
                card.innerHTML = `<p class="text-red-400">Error loading data for ${slug}</p>`;
            }
        }
    </script>
</body>
</html>
